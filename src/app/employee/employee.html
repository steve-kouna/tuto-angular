<!-- Details -->
<div class="details">
  <div class="details-row">
    <div class="label">Name :</div>
    <div class="value" (click)="onNameClick(employee._id)">{{ employee.name }}</div>
  </div>
  <div class="details-row">
    <div class="label">Level :</div>
    <div class="value">{{ employee.level | level}}</div>
  </div>
  <div class="details-row">
    <div class="label">Department :</div>
    <div class="value">{{employee.department}}</div>
  </div>
</div>
